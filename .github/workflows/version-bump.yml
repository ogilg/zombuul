name: Version Bump

on:
  push:
    branches: [main]

jobs:
  bump:
    # Skip on bump-merge commits to break the loop.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: |
          NEW=$(python3 - <<'PY'
          import json, re, sys
          path = ".claude-plugin/plugin.json"
          with open(path) as f:
              d = json.load(f)
          v = d["version"]
          m = re.match(r"^(\d+)\.(\d+)\.(\d+)$", v)
          if not m:
              sys.exit(
                  f"FATAL: main's plugin.json version '{v}' is not strict semver. "
                  "A dev-only suffix likely leaked into main — investigate before "
                  "letting this workflow corrupt the release further."
              )
          major, minor, patch = m.groups()
          new = f"{major}.{minor}.{int(patch) + 1}"
          d["version"] = new
          with open(path, "w") as f:
              json.dump(d, f, indent=2)
              f.write("\n")
          print(new)
          PY
          )
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"
          echo "BRANCH=auto/bump-main-$NEW" >> "$GITHUB_ENV"

      - name: Push branch, tag, open auto-merge PR
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .claude-plugin/plugin.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push -u origin "$BRANCH"
          git push origin "v${{ steps.bump.outputs.new_version }}"
          gh pr create --base main --head "$BRANCH" \
            --title "chore: bump version to ${{ steps.bump.outputs.new_version }}" \
            --body "Auto-bump after merge to main."
          gh pr merge "$BRANCH" --auto --merge \
            --subject "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
