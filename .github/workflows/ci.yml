name: CI

# Fire on every push. The pull_request trigger was unreliable on PR open
# (~40% of PRs today saw no CI dispatch until we pushed an empty commit).
# push events fire reliably, and GitHub associates check runs with PRs by
# head SHA so branch protection sees them as PR checks just the same.
on:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Keep in sync with the PEP 723 block in scripts/runpod_ctl.py.
        run: pip install pytest runpod python-dotenv pyyaml

      - name: Run tests
        run: pytest tests/ -v

  shellcheck:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck all scripts/*.sh
        run: shellcheck scripts/*.sh

  validate:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate plugin manifests and skill frontmatter
        run: python scripts/validate_plugin.py
